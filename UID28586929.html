    width: 100% !important;
    max-height: 420px;

  .events-grid {

    font-size: 13px;
    color: #a5b4fc;
    font-style: italic;
  }

  .event-card .score {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 22px;
    font-weight: 700;
  }

  .positive { color: var(--positive); }
  .negative { color: var(--negative); }
  .warning { color: var(--warning); }

  .insights {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    margin-bottom: 32px;

  .insight-card {

</style>

    title: '🏆 情绪峰值：抽中1899商单指导课',
    desc: '直播抽奖抽中"1899商单指导课"，立刻报告老师并询问何时可以开始学习，显示出极强的行动欲望。',

  },
  {
    date: '2026-02-14',

  {

    label: '等待点评',
    score: 52,

    sentiment: 'warning',

  {

    sentiment: 'crisis',
    title: '🚨 谷值：出现在客服投诉群',
    desc: '距最后一次课程互动11天后，直接联系客服群（多宝+小寻）。"就这么说吧，不方便打电话"——说明有较严重的不满。',
    quote: '就这么说吧，不方便打电话'
  }
];

// ============= 颜色生成 =============
function getColor(score, alpha=1) {
  if (score >= 80) return `rgba(16,185,129,${alpha})`;
  if (score >= 60) return `rgba(59,130,246,${alpha})`;
  if (score >= 40) return `rgba(245,158,11,${alpha})`;
  return `rgba(239,68,68,${alpha})`;
}

// ============= 渲染事件卡片 =============
const grid = document.getElementById('eventsGrid');
dataPoints.forEach(d => {
  const color = getColor(d.score);
  const sentiment = d.score >= 80 ? 'positive' : d.score >= 60 ? '' : d.score >= 40 ? 'warning' : 'negative';
  grid.innerHTML += `
    <div class="event-card">
      <div class="phase">
        <span class="dot" style="background:${d.phaseColor}"></span>
        ${d.phase}
      </div>
      <div class="score ${sentiment}">${d.score > 0 ? d.score : d.score}</div>
      <div class="title">${d.title}</div>
      <div class="desc">${d.desc}</div>
      <div class="quote">"${d.quote}"</div>
    </div>
  `;
});

// ============= Chart.js 曲线图 =============
const ctx = document.getElementById('satisfactionChart').getContext('2d');

// 渐变区域
const gradientFill = ctx.createLinearGradient(0, 0, 0, 400);
gradientFill.addColorStop(0, 'rgba(99,102,241,0.3)');
gradientFill.addColorStop(0.5, 'rgba(59,130,246,0.1)');
gradientFill.addColorStop(1, 'rgba(239,68,68,0.05)');

const labels = dataPoints.map(d => d.label);
const scores = dataPoints.map(d => d.score);
const pointColors = dataPoints.map(d => getColor(d.score));
const pointBorders = dataPoints.map(d => {
  if (d.sentiment === 'peak') return '#fbbf24';
  if (d.sentiment === 'crisis') return '#ef4444';
  return getColor(d.score);
});

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: '满意度指数',
      data: scores,
      borderColor: 'rgba(99,102,241,0.8)',
      borderWidth: 3,
      pointBackgroundColor: pointColors,
      pointBorderColor: pointBorders,
      pointBorderWidth: 3,
      pointRadius: 7,
      pointHoverRadius: 10,
      fill: true,
      backgroundColor: gradientFill,
      tension: 0.45,
    }]
  },
  options: {
    responsive: true,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        enabled: false,
        external: function(context) {
          const tooltip = document.getElementById('tooltip');
          if (context.tooltip.opacity === 0) {
            tooltip.style.display = 'none';
            return;
          }
          const idx = context.tooltip.dataPoints[0].dataIndex;
          const d = dataPoints[idx];
          tooltip.style.display = 'block';
          document.getElementById('t-date').textContent = d.date;
          document.getElementById('t-title').textContent = d.title;
          const scoreEl = document.getElementById('t-score');
          scoreEl.textContent = d.score;
          scoreEl.style.color = getColor(d.score);
          document.getElementById('t-reason').textContent = d.desc;
          const canvasRect = ctx.canvas.getBoundingClientRect();
          const x = context.tooltip.caretX;
          const y = context.tooltip.caretY;
          tooltip.style.left = (x + canvasRect.left - tooltip.offsetWidth / 2 + window.scrollX) + 'px';
          tooltip.style.top = (y + canvasRect.top - tooltip.offsetHeight - 20 + window.scrollY) + 'px';
          tooltip.style.position = 'absolute';
        }
      },
    },
    scales: {
      x: {
        grid: { color: 'rgba(31,45,69,0.6)', drawBorder: false },
        ticks: {
          color: '#64748b',
          font: { size: 11, family: 'Noto Sans SC' },
          maxRotation: 30,
        }
      },
      y: {
        min: -30,
        max: 100,
        grid: { color: 'rgba(31,45,69,0.6)', drawBorder: false },
        ticks: {
          color: '#64748b',
          font: { size: 11 },
          callback: v => v === 0 ? '0 中性线' : v
        }
      }
    },
    animation: {
      duration: 1800,
      easing: 'easeInOutQuart'
    }
  },
  plugins: [{
    id: 'zeroLine',
    afterDraw(chart) {
      const { ctx, chartArea, scales } = chart;
      const y0 = scales.y.getPixelForValue(0);
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(chartArea.left, y0);
      ctx.lineTo(chartArea.right, y0);
      ctx.stroke();
      ctx.restore();

      // 标注满意区/不满区
      ctx.save();
      ctx.font = '11px Inter';
      ctx.fillStyle = 'rgba(16,185,129,0.4)';
      ctx.fillText('▲ 满意区', chartArea.left + 8, chartArea.top + 16);
      ctx.fillStyle = 'rgba(239,68,68,0.4)';
      ctx.fillText('▼ 不满/风险区', chartArea.left + 8, y0 + 20);
      ctx.restore();
    }
  }]
});

// ============= 动态背景网格效果 =============
document.addEventListener('mousemove', (e) => {
  const tooltip = document.getElementById('tooltip');
  if (tooltip.style.display === 'block') return;
});
</script>
