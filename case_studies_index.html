      --bg-surface-hover: #27272a;
      --border: #3f3f46;

      --text-dim: #a1a1aa;
      --text-muted: #71717a;

      --brand-primary: #ef4444;
      --brand-secondary: #f97316;
      --brand-accent: #10b981;
      --brand-glow: rgba(239, 68, 68, 0.2);

      --grade-a: #10b981;
      --grade-b: #3b82f6;
      --grade-c: #f59e0b;
      --grade-d: #ef4444;
      --grade-na: #71717a;

      --tag-red: #fca5a5;
      --tag-blue: #93c5fd;
      --tag-green: #86efac;
      --tag-orange: #fdba74;
      --tag-purple: #c4b5fd;

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {

      background-color: var(--bg); color: var(--text); line-height: 1.6;

    .bg-glow {
      position: fixed; top: -20vh; left: 50%; transform: translateX(-50%);
      width: 100vw; height: 60vh;
      background: radial-gradient(ellipse at bottom, rgba(59, 130, 246, 0.1) 0%, rgba(9, 9, 11, 0) 70%);
      z-index: -1; pointer-events: none;
    }

    .main-container { max-width: 1400px; margin: 0 auto; padding: 40px 24px; }

    /* ───── Hero ───── */
    .hero { margin-bottom: 48px; text-align: center; animation: fadeUp 0.8s ease-out; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px;
      border-radius: 100px; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3);
      color: #60a5fa; font-size: 12px; font-weight: 800; letter-spacing: 1px;
      margin-bottom: 24px; text-transform: uppercase;
    }
    .origin-pulse {
      width: 6px; height: 6px; border-radius: 50%; background: #3b82f6;
      box-shadow: 0 0 10px #3b82f6; animation: pulse 2s infinite;

    h1 {
      font-size: clamp(32px, 5vw, 56px); font-weight: 900; line-height: 1.1; letter-spacing: -2px; margin-bottom: 20px;

      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero-subtitle { font-size: clamp(14px, 2vw, 18px); color: var(--text-dim); max-width: 800px; margin: 0 auto; font-weight: 500; }

    /* ───── Stats Bar ───── */
    .stats-bar {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px;
      margin-bottom: 40px; animation: fadeUp 0.8s ease-out 0.15s backwards;
    }
    .stat-card {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 20px; text-align: center; transition: all 0.3s;
    }
    .stat-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-3px); }
    .stat-number { font-size: 32px; font-weight: 900; line-height: 1; margin-bottom: 6px; }
    .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; }
    .stat-card.grade-a .stat-number { color: var(--grade-a); }
    .stat-card.grade-b .stat-number { color: var(--grade-b); }
    .stat-card.grade-c .stat-number { color: var(--grade-c); }
    .stat-card.grade-d .stat-number { color: var(--grade-d); }
    .stat-card.total .stat-number {
      background: linear-gradient(135deg, #fff, #a1a1aa);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ───── Controls ───── */
    .controls-bar {
      display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 32px;
      animation: fadeUp 0.8s ease-out 0.25s backwards; align-items: center;
    }
    .search-box {
      flex: 1; min-width: 260px; position: relative;
    }
    .search-box input {
      width: 100%; padding: 12px 16px 12px 44px; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: 12px; color: var(--text);
      font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: #3b82f6; }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 16px; color: var(--text-muted); pointer-events: none;
    }
    .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border);
      background: transparent; color: var(--text-dim); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .filter-btn:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
    .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    .filter-btn.active-a { background: var(--grade-a); border-color: var(--grade-a); color: #fff; }
    .filter-btn.active-b { background: var(--grade-b); border-color: var(--grade-b); color: #fff; }
    .filter-btn.active-c { background: var(--grade-c); border-color: var(--grade-c); color: #fff; }
    .filter-btn.active-d { background: var(--grade-d); border-color: var(--grade-d); color: #fff; }

    .view-toggle { display: flex; gap: 4px; margin-left: auto; }
    .view-btn {
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); cursor: pointer; transition: all 0.2s; font-size: 16px;
    }
    .view-btn.active { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.2); }

    /* ───── Report Cards Grid ───── */
    .reports-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px;
      animation: fadeUp 0.8s ease-out 0.35s backwards;
    }
    .reports-grid.list-view { grid-template-columns: 1fr; }

    .report-card {
      display: flex; flex-direction: column; padding: 24px; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: 16px; text-decoration: none; color: var(--text);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden;
      cursor: pointer;
    }
    .report-card:hover {
      background: var(--bg-surface-hover); border-color: rgba(255,255,255,0.2);
      transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    }
    .report-card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
      opacity: 0; transition: opacity 0.3s;
    }
    .report-card:hover::before { opacity: 1; }
    .report-card[data-grade="A"]::before { background: var(--grade-a); }
    .report-card[data-grade="B"]::before { background: var(--grade-b); }
    .report-card[data-grade="C"]::before { background: var(--grade-c); }

    .grade-badge.grade-c { background: rgba(245,158,11,0.15); color: var(--grade-c); }
    .grade-badge.grade-d { background: rgba(239,68,68,0.15); color: var(--grade-d); }
    .grade-badge.grade-na { background: rgba(113,113,122,0.15); color: var(--grade-na); }

    .card-arrow {

    .type-badge {

    .type-diagnostic { background: rgba(59,130,246,0.15); color: #93c5fd; }
    .type-decoder { background: rgba(139,92,246,0.15); color: #c4b5fd; }

    .empty-state {
      text-align: center; padding: 80px 20px; color: var(--text-muted);

    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-title { font-size: 18px; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; }

    @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .result-count {

      .controls-bar { flex-direction: column; }
      .search-box { min-width: 100%; }
      .view-toggle { display: none; }
    }

    // =======================================
    // RENDER ENGINE
    // =======================================
    function getGradeClass(grade) {
      const map = { 'A': 'grade-a', 'B': 'grade-b', 'C': 'grade-c', 'D': 'grade-d' };
      return map[grade] || 'grade-na';
    }

    function getGradeLabel(grade) {
      const map = { 'A': 'A', 'B': 'B', 'C': 'C', 'D': 'D' };
      return map[grade] || '—';
    }

    function getTypeBadge(type) {
      const map = {
        'refund': '<span class="type-badge type-refund">退费</span>',
        'converted': '<span class="type-badge type-converted">已转化</span>',
        'diagnostic': '<span class="type-badge type-diagnostic">诊断</span>',
        'decoder': '<span class="type-badge type-decoder">深度解码</span>',
      };
      return map[type] || '';
    }

    function getTagColorClass(tag, index) {
      // Assign colors based on content hints
      if (tag.includes('退费') || tag.includes('退') || tag.includes('负债') || tag.includes('危') || tag.includes('轻生') || tag.includes('PUA') || tag.includes('恶') || tag.includes('违规') || tag.includes('红线')) return 'tag-red';
      if (tag.includes('已转化') || tag.includes('成交') || tag.includes('天赋') || tag.includes('范例') || tag.includes('极强')) return 'tag-green';
      if (tag.includes('解码') || tag.includes('DISC') || tag.includes('潜力') || tag.includes('S1')) return 'tag-purple';
      if (tag.includes('冲动') || tag.includes('营销') || tag.includes('花呗') || tag.includes('缺乏') || tag.includes('漏洞')) return 'tag-orange';
      const fallback = ['tag-blue', 'tag-purple', 'tag-green', 'tag-orange'];
      return fallback[index % fallback.length];
    }

    function renderCard(report) {
      const gradeClass = getGradeClass(report.grade);
      const gradeLabel = getGradeLabel(report.grade);
      const typeBadge = getTypeBadge(report.type);
      const tagsHtml = report.tags.slice(0, 3).map((t, i) =>
        `<span class="tag ${getTagColorClass(t, i)}">${t}</span>`
      ).join('');

      return `
        <a href="user/uid_${report.uid}_report.html" class="report-card"
           data-grade="${report.grade}" data-type="${report.type}"
           data-search="${report.name} ${report.uid} ${report.title} ${report.tags.join(' ')}">
          <div class="card-header">
            <div class="grade-badge ${gradeClass}">${gradeLabel}</div>
            <div>
              <div class="card-uid">UID ${report.uid}</div>
              ${typeBadge}
            </div>
          </div>
          <div class="card-body">
            <div class="card-name">${report.name}</div>
            <div class="card-title-sub">${report.title}</div>
            <div class="card-tags">${tagsHtml}</div>
          </div>
          <div class="card-footer">
            <span class="card-meta">${report.sizeKB} KB · 深度分析</span>
            ${extraContent}
            <div class="card-arrow">→</div>
          </div>
        </a>
      `;
    }

    function renderStats() {
      const total = REPORTS.length;
      const gradeA = REPORTS.filter(r => r.grade === 'A').length;
      const gradeB = REPORTS.filter(r => r.grade === 'B').length;
      const gradeD = REPORTS.filter(r => r.grade === 'D').length;
      const refund = REPORTS.filter(r => r.type === 'refund').length;
      const converted = REPORTS.filter(r => r.type === 'converted').length;
      const decoder = REPORTS.filter(r => r.type === 'decoder').length;

      document.getElementById('statsBar').innerHTML = `
        <div class="stat-card total"><div class="stat-number">${total}</div><div class="stat-label">全量案例</div></div>
        <div class="stat-card grade-a"><div class="stat-number">${gradeA}</div><div class="stat-label">A类 · 高价值</div></div>
        <div class="stat-card grade-b"><div class="stat-number">${gradeB}</div><div class="stat-label">B类 · 稳定型</div></div>
        <div class="stat-card grade-d"><div class="stat-number">${gradeD}</div><div class="stat-label">D类 · 高危</div></div>
        <div class="stat-card"><div class="stat-number" style="color:#f97316;">${refund}</div><div class="stat-label">退费案例</div></div>
        <div class="stat-card"><div class="stat-number" style="color:#10b981;">${converted}</div><div class="stat-label">已转化</div></div>
        <div class="stat-card"><div class="stat-number" style="color:#a78bfa;">${decoder}</div><div class="stat-label">深度解码</div></div>
      `;
    }

    function renderReports(filteredReports) {
      const grid = document.getElementById('reportsGrid');
      const empty = document.getElementById('emptyState');
      const countEl = document.getElementById('resultCount');

      if (filteredReports.length === 0) {
        grid.innerHTML = '';
        empty.classList.add('visible');
        countEl.textContent = '';
        return;
      }

      empty.classList.remove('visible');
      countEl.innerHTML = `显示 <strong>${filteredReports.length}</strong> 个案例`;

      // Stagger animations
      grid.innerHTML = filteredReports.map((r, i) => {
        const card = renderCard(r);
        return card.replace('class="report-card"', `class="report-card" style="animation-delay: ${Math.min(i * 0.03, 0.6)}s"`);
      }).join('');
    }

    // =======================================
    // FILTER & SEARCH
    // =======================================
    let currentFilter = 'all';
    let currentSearch = '';

    function applyFilters() {
      let filtered = [...REPORTS];

      // Apply category filter
      if (currentFilter === 'A') filtered = filtered.filter(r => r.grade === 'A');
      else if (currentFilter === 'B') filtered = filtered.filter(r => r.grade === 'B');
      else if (currentFilter === 'D') filtered = filtered.filter(r => r.grade === 'D');
      else if (currentFilter === 'refund') filtered = filtered.filter(r => r.type === 'refund');
      else if (currentFilter === 'converted') filtered = filtered.filter(r => r.type === 'converted');

      // Apply search
      if (currentSearch) {
        const query = currentSearch.toLowerCase();
        filtered = filtered.filter(r => {
          const searchPool = `${r.name} ${r.uid} ${r.title} ${r.tags.join(' ')}`.toLowerCase();
          return searchPool.includes(query);
        });
      }

      renderReports(filtered);
    }

    // Filter buttons
    document.getElementById('filterGroup').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;

      currentFilter = btn.dataset.filter;

      // Update active states
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.className = 'filter-btn';
      });

      if (currentFilter === 'A') btn.className = 'filter-btn active-a';
      else if (currentFilter === 'B') btn.className = 'filter-btn active-b';
      else if (currentFilter === 'D') btn.className = 'filter-btn active-d';
      else btn.className = 'filter-btn active';

      applyFilters();
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      currentSearch = e.target.value.trim();
      applyFilters();
    });

    // View toggle
    document.getElementById('gridViewBtn').addEventListener('click', () => {
      document.getElementById('reportsGrid').classList.remove('list-view');
      document.getElementById('gridViewBtn').classList.add('active');
      document.getElementById('listViewBtn').classList.remove('active');
    });
    document.getElementById('listViewBtn').addEventListener('click', () => {
      document.getElementById('reportsGrid').classList.add('list-view');
      document.getElementById('listViewBtn').classList.add('active');
      document.getElementById('gridViewBtn').classList.remove('active');
    });

    // =======================================
    // INIT
    // =======================================
    renderStats();
    renderReports(REPORTS);
  </script>
